      return (

    }

    function calculateBAndWN(penyandangList) {
      if (!penyandangList || penyandangList.length === 0) {
        return { valB: "01", valWN: "-" };
      }

      const totalPenyandang = penyandangList.length;
      const formattedB = totalPenyandang < 10 ? `0${totalPenyandang}` : `${totalPenyandang}`;

      const group = {};
      penyandangList.forEach(p => {
        const wn = (p.warganegara || "").trim().toUpperCase();
        const passport = (p.pasport || "").trim();
        
        let displayWN = wn;
        if (wn === "MYS" && passport.length > 0) {
          const code = passport.charAt(0).toUpperCase();
          displayWN = `MYS '${code}'`;
        }

        group[displayWN] = (group[displayWN] || 0) + 1;
      });

      const wnRows = Object.keys(group).map(key => {
        const count = group[key];
        const formattedCount = count < 10 ? `0${count}` : `${count}`;
        return `${formattedCount} ${key}`;
      });

      return {
        valB: formattedB,
        valWN: wnRows.join("\n")
      };
    }

    const SECTORS_LIST = [
      { id: "og", name: "1. Minyak & Gas (Oil & Gas)" },
      { id: "perkhidmatan", name: "2. Perkhidmatan" },
      { id: "kerajaan", name: "3. Kerajaan" },
      { id: "lanjutan", name: "4. Lanjutan" },
      { id: "kelulusan_dasar", name: "5. Kelulusan Dasar" }
    ];

    const DEFAULT_SHEET_URL = "https://script.google.com/macros/s/AKfycbzV9rOzjZ1EFxbVN2NRAM0SRaJNSCOz57SaByxUT4RqskgnXgpHdtAI-2Txms6AANqh/exec";

    function App() {
      const [meetingNumber, setMeetingNumber] = useState(() => {
        return localStorage.getItem('jkplik_meeting_number') || "14";
      });
      const [meetingYear, setMeetingYear] = useState(() => {
        return localStorage.getItem('jkplik_meeting_year') || "2026";
      });
      const [officerName, setOfficerName] = useState(() => {
        return localStorage.getItem('jkplik_officer_name') || "";
      });

      const [activeSector, setActiveSector] = useState("og");
      const [viewMode, setViewMode] = useState("dashboard"); // dashboard, meeting, settings

      const [showEditModal, setShowEditModal] = useState(false);
      const [editingCompany, setEditingCompany] = useState(null);
      const [editPenyandang, setEditPenyandang] = useState({
        nama: "", jantina: "L", warganegara: "MYS", pasport: "", tarikhLahir: "", umur: "", jawatan: "", gaji: ""
      });

      const [dataOG, setDataOG] = useState(() => {
        const saved = localStorage.getItem('jkplik_data_og_v3');
        return saved ? JSON.parse(saved) : [];
      });
      const [dataOthers, setDataOthers] = useState(() => {
        const saved = localStorage.getItem('jkplik_data_others_v3');
        return saved ? JSON.parse(saved) : {};
      });

      const [currentSlideIndex, setCurrentSlideIndex] = useState(0);
      const [searchQuery, setSearchQuery] = useState("");
      const [statusFilter, setStatusFilter] = useState("semua");

      const [sheetUrl, setSheetUrl] = useState(() => {
        return localStorage.getItem('jkplik_sheet_url_v3') || DEFAULT_SHEET_URL;
      });
      const [isSyncing, setIsSyncing] = useState(false);
      const [syncLogs, setSyncLogs] = useState([]);

      const [toasts, setToasts] = useState([]);
      const showToast = (message, type = "info") => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 4000);
      };

      const [confirmModal, setConfirmModal] = useState({ show: false, action: null, message: "" });

      const [showAddModal, setShowAddModal] = useState(false);
      const [companySearchQuery, setCompanySearchQuery] = useState("");
      const [ownerSearchQuery, setOwnerSearchQuery] = useState("");
      const [showCompanyDropdown, setShowCompanyDropdown] = useState(false);
      const [showOwnerDropdown, setShowOwnerDropdown] = useState(false);

      const [pastSheets, setPastSheets] = useState([]);
      const [showArchiveModal, setShowArchiveModal] = useState(false);
      const [archiveSearchQuery, setArchiveSearchQuery] = useState("");
      const [globalCompanies, setGlobalCompanies] = useState([]);
      const [globalOwners, setGlobalOwners] = useState([]);
      const [isLoadingArchive, setIsLoadingArchive] = useState(false);

      const [newCompany, setNewCompany] = useState({
        namaSyarikat: "",
        alamat: "",
        kegiatan: "",
        projek: "",
        noKontrak: "",
        tempohProjek: "",
        ownerProjek: "",
        tempohMohon: "06 BULAN",
        valB: "01", 
        valL: "-",  
        valTR: "-", 
        valWN: "01 MYS 'A'",
        penyandang: [],
        synced: false
      });

      const [newPenyandang, setNewPenyandang] = useState({
        nama: "", jantina: "L", warganegara: "MYS", pasport: "", tarikhLahir: "", umur: "", jawatan: "", gaji: ""
      });

      const triggerEditItem = (item) => {
        setEditingCompany(JSON.parse(JSON.stringify(item)));
        setShowEditModal(true);
      };

      const handleEditBirthDateChange = (dateValue) => {
        if (!dateValue) {
          setEditPenyandang(prev => ({ ...prev, tarikhLahir: "", umur: "" }));
          return;
        }
        const birthDate = new Date(dateValue);
        if (isNaN(birthDate)) return;
        const birthYear = birthDate.getFullYear();
        const currentYearNum = parseInt(meetingYear) || 2026;
        const calculatedAge = currentYearNum - birthYear;
        setEditPenyandang(prev => ({
          ...prev,
          tarikhLahir: dateValue,
          umur: calculatedAge > 0 ? `${calculatedAge} THN` : ""
        }));
      };

      const addPenyandangToEditingCompany = () => {
        if (!editPenyandang.nama) return;
        setEditingCompany(prev => {
          const updatedPenyandang = [...prev.penyandang, editPenyandang];
          const { valB, valWN } = calculateBAndWN(updatedPenyandang);
          return {
            ...prev,
            penyandang: updatedPenyandang,
            valB,
            valWN
          };
        });
        setEditPenyandang({
          nama: "", jantina: "L", warganegara: "MYS", pasport: "", tarikhLahir: "", umur: "", jawatan: "", gaji: ""
        });
      };

      const removePenyandangFromEditingCompany = (idx) => {
        setEditingCompany(prev => {
          const filtered = prev.penyandang.filter((_, i) => i !== idx);
          const { valB, valWN } = calculateBAndWN(filtered);
          return {
            ...prev,
            penyandang: filtered,
            valB,
            valWN
          };
        });
      };

      const handleUpdateCompany = (e) => {
        e.preventDefault();
        if (!editingCompany.namaSyarikat) return;

        let updatedList = [];
        if (activeSector === "og") {
          setDataOG(prev => {
            updatedList = prev.map(item => item.id === editingCompany.id ? { ...editingCompany, synced: false } : item);
            syncEditRowToGoogleSheets(editingCompany, updatedList);
            return updatedList;
          });
        } else {
          setDataOthers(prev => {
            const sectorData = prev[activeSector] || [];
            updatedList = sectorData.map(item => item.id === editingCompany.id ? { ...editingCompany, synced: false } : item);
            syncEditRowToGoogleSheets(editingCompany, updatedList);
            return { ...prev, [activeSector]: updatedList };
          });
        }

        setShowEditModal(false);
        setEditingCompany(null);
        showToast(`Permohonan ${editingCompany.namaSyarikat} berjaya dikemas kini!`, "success");
      };

      const syncEditRowToGoogleSheets = async (updatedItem, allItems) => {
        if (!sheetUrl) return;
        const sheetName = getSheetName();
        addLog(`[AUTO-SYNC] Mengemaskini perubahan "${updatedItem.namaSyarikat}" di Google Sheets...`, "info");
        try {
          await fetch(sheetUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              action: "sync_all", 
              data: allItems, 
              activeSector,
              sheetName: sheetName
            })
          });
          addLog(`[AUTO-SYNC] Maklumat "${updatedItem.namaSyarikat}" dikemaskini di Google Sheets.`, "success");
          markAsSynced(updatedItem.id, true);
        } catch (err) {
          addLog(`[AUTO-SYNC] Gagal kemaskini di Google Sheets: ${err.message}`, "error");
        }
      };

      const fetchGlobalHistory = async () => {
        if (!sheetUrl) return;
        try {
          const res = await fetch(sheetUrl, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "get_global_history" })
          });
          const result = await res.json();
          if (result.status === "success") {
            setGlobalCompanies(result.companies || []);
            setGlobalOwners(result.owners || []);
            addLog(`Berjaya memuatkan ${result.companies.length} rekod syarikat sejarah dari Google Sheets.`, "success");
          }
        } catch (err) {
          addLog("Gagal menghubungi pangkalan data awan untuk carian sejarah.", "error");
        }
      };

      useEffect(() => {
        if (showAddModal) {
          fetchGlobalHistory();
        }
      }, [showAddModal]);

      const fetchArchiveSheets = async () => {
        if (!sheetUrl) {
          showToast("URL Google Apps Script tidak ditemui.", "error");
          return;
        }
        setIsLoadingArchive(true);
        try {
          const res = await fetch(sheetUrl, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "get_sheets_list" })
          });
          const result = await res.json();
          if (result.status === "success") {
            setPastSheets(result.sheets || []);
            setShowArchiveModal(true);
          } else {
            showToast("Gagal memuatkan senarai arkib.", "error");
          }
        } catch (err) {
          showToast("Ralat sambungan API dikesan.", "error");
        } finally {
          setIsLoadingArchive(false);
        }
      };

      const loadPastSheetData = async (selectedSheetName) => {
        setIsLoadingArchive(true);
        addLog(`Memuatkan rekod arkib dari tab [${selectedSheetName}]...`, "info");
        try {
          const res = await fetch(sheetUrl, {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: "load_sheet_data", sheetName: selectedSheetName })
          });
          const result = await res.json();
          if (result.status === "success") {
            const records = result.records || [];
            
            if (activeSector === "og") {
              setDataOG(records);
            } else {
              setDataOthers(prev => ({ ...prev, [activeSector]: records }));
            }

            const match = selectedSheetName.match(/Bil\.\s*(\d+)\/(\d+)/i);
            if (match) {
              setMeetingNumber(match[1]);
              setMeetingYear(match[2]);
            }

            showToast(`Berjaya memuatkan ${records.length} data daripada tab ${selectedSheetName}!`, "success");
            setShowArchiveModal(false);
          } else {
            showToast("Isu dikesan semasa memuat turun data arkib.", "error");
          }
        } catch (err) {
          showToast("Ralat semasa memanggil API Sheets.", "error");
        } finally {
          setIsLoadingArchive(false);
        }
      };

                          type="text"
                          value={editingCompany.valL}
                          onChange={(e) => setEditingCompany({...editingCompany, valL: e.target.value.toUpperCase()})}
                          className="bg-white border border-amber-300 rounded p-1 text-center font-bold text-xs"
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] font-bold text-amber-900">T/R (Tukar Re-entry)</span>
                        <input
                          type="text"
                          value={editingCompany.valTR}
                          onChange={(e) => setEditingCompany({...editingCompany, valTR: e.target.value.toUpperCase()})}
                          className="bg-white border border-amber-300 rounded p-1 text-center font-bold text-xs"
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] font-bold text-amber-900">W/N (Ringkasan)</span>
                        <input
                          type="text"
                          value={editingCompany.valWN}
                          readOnly
                          className="bg-slate-100 border border-amber-300 rounded p-1 text-center font-bold text-xs text-slate-500 cursor-not-allowed whitespace-pre-line"
                        />
                      </div>
                    </div>

                  </div>

                  {/* Pengurusan Penyandang Semasa Edit */}
                  <div className="border-t border-slate-200 pt-4 mt-2 flex flex-col gap-3">
                    <span className="text-xs font-bold text-blue-955 uppercase tracking-wider">
                      Urus Ahli / Penyandang Aktif
                    </span>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 bg-slate-50 p-4 rounded-xl border border-slate-200">
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] text-slate-500 font-bold">Nama Penuh</span>
                        <input
                          type="text"
                          placeholder="Nama penyandang baru"
                          value={editPenyandang.nama}
                          onChange={(e) => setEditPenyandang({...editPenyandang, nama: e.target.value.toUpperCase()})}
                          className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs"
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] text-slate-500 font-bold">Jawatan</span>
                        <input
                          type="text"
                          placeholder="Jawatan dalam syarikat"
                          value={editPenyandang.jawatan}
                          onChange={(e) => setEditPenyandang({...editPenyandang, jawatan: e.target.value.toUpperCase()})}
                          className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs"
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] text-slate-500 font-bold">Gaji Bulanan</span>
                        <input
                          type="text"
                          placeholder="Contoh: RM8,500"
                          value={editPenyandang.gaji}
                          onChange={(e) => setEditPenyandang({...editPenyandang, gaji: e.target.value.toUpperCase()})}
                          className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs"
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] text-slate-500 font-bold">No. Pasport</span>
                        <input
                          type="text"
                          placeholder="Mula dengan huruf"
                          value={editPenyandang.pasport}
                          onChange={(e) => setEditPenyandang({...editPenyandang, pasport: e.target.value.toUpperCase()})}
                          className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs"
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] text-slate-500 font-bold">Tarikh Lahir</span>
                        <input
                          type="date"
                          value={editPenyandang.tarikhLahir}
                          onChange={(e) => handleEditBirthDateChange(e.target.value)}
                          className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs"
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] text-slate-500 font-bold">Warganegara</span>
                        <input
                          type="text"
                          placeholder="Contoh: MYS"
                          value={editPenyandang.warganegara}
                          onChange={(e) => setEditPenyandang({...editPenyandang, warganegara: e.target.value.toUpperCase()})}
                          className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs"
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] text-slate-500 font-bold">Umur</span>
                        <input
                          type="text"
                          value={editPenyandang.umur}
                          onChange={(e) => setEditPenyandang({...editPenyandang, umur: e.target.value.toUpperCase()})}
                          className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs"
                        />
                      </div>
                      <div className="flex flex-col gap-1">
                        <span className="text-[10px] text-slate-500 font-bold">Jantina</span>
                        <select
                          value={editPenyandang.jantina}
                          onChange={(e) => setEditPenyandang({...editPenyandang, jantina: e.target.value})}
                          className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs"
                        >
                          <option value="L">Lelaki</option>
                          <option value="P">Perempuan</option>
                        </select>
                      </div>
                      <div className="flex items-end md:col-span-4 mt-2">
                        <button
                          type="button"
                          onClick={addPenyandangToEditingCompany}
                          className="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-2 rounded text-xs"
                        >
                          + Masukkan Penyandang Baharu Ini
                        </button>
                      </div>
                    </div>

                    {editingCompany.penyandang && editingCompany.penyandang.length > 0 && (
                      <div className="flex flex-col gap-2 bg-slate-50 p-3 rounded-lg border border-slate-200 max-h-32 overflow-y-auto">
                        {editingCompany.penyandang.map((p, idx) => (
                          <div key={idx} className="flex items-center justify-between text-xs border-b border-slate-200 pb-1.5 last:border-0 last:pb-0">
                            <span>{idx + 1}. <strong>{p.nama}</strong> ({p.jawatan} • {p.gaji} • WN: {p.warganegara} • Umur: {p.umur})</span>
                            <button
                              type="button"
                              onClick={() => removePenyandangFromEditingCompany(idx)}
                              className="text-red-600 hover:text-red-850 font-bold text-[10px]"
                            >
                              Padam Rekod
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div className="flex items-center justify-end gap-3 border-t border-slate-200 pt-4 mt-4">
                    <button
                      type="button"
                      onClick={() => {
                        setShowEditModal(false);
                        setEditingCompany(null);
                      }}
                      className="bg-transparent text-slate-500 hover:text-slate-700 text-xs font-bold px-4 py-2"
                    >
                      Batal
                    </button>
                    <button
                      type="submit"
                      className="bg-blue-955 hover:bg-blue-900 text-white text-xs font-bold px-5 py-2.5 rounded-lg"
                    >
                      Simpan Perubahan & Kemaskini Sheets
                    </button>
                  </div>

                </form>

              </div>
            </div>
          )}

          {/* ================================= MODAL CARIAN ARKIB SHEETS ================================= */}
          {showArchiveModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs z-50 flex items-center justify-center p-4">
              <div className="bg-white border border-slate-200 rounded-2xl w-full max-w-md p-6 shadow-2xl flex flex-col gap-4">
                <div className="flex items-center justify-between border-b border-slate-200 pb-3">
                  <h3 className="text-sm font-bold text-blue-955 flex items-center gap-1.5">
                    <Icon name="database" size={18} className="text-blue-900" /> Arkib Helaian Google Sheets
                  </h3>
                  <button onClick={() => {
                    setShowArchiveModal(false);
                    setArchiveSearchQuery("");
                  }} className="text-slate-400 hover:text-slate-600 text-xs font-bold">
                    Tutup
                  </button>
                </div>

                <p className="text-[11px] text-slate-600 leading-relaxed">
                  Sila pilih mesyuarat sejarah daripada senarai tab Google Sheets di bawah. Anda juga boleh mencari mengikut **Nama Pegawai**, **Bil. Mesyuarat**, atau **Tahun**.
                </p>

                {/* Input Carian Dinamik Rentas Pegawai Penilai */}
                <div className="relative">
                  <input
                    type="text"
                    placeholder="Taip nama pegawai, bil, atau tahun..."
                    value={archiveSearchQuery}
                    onChange={(e) => setArchiveSearchQuery(e.target.value)}
                    className="w-full bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-blue-700 font-semibold"
                  />
                  {archiveSearchQuery && (
                    <button 
                      onClick={() => setArchiveSearchQuery("")}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 font-bold text-xs"
                    >
                      Batal
                    </button>
                  )}
                </div>

                <div className="flex-1 max-h-60 overflow-y-auto border border-slate-200 rounded-xl divide-y divide-slate-150">
                  {filteredPastSheets.length === 0 ? (
                    <div className="p-4 text-center text-[11px] text-slate-400 italic">Tiada tab dijumpai / padan dengan carian.</div>
                  ) : (
                    filteredPastSheets.map((shName, idx) => (
                      <div
                        key={idx}
                        onClick={() => {
                          loadPastSheetData(shName);
                          setArchiveSearchQuery("");
                        }}
                        className="p-3 hover:bg-slate-50 cursor-pointer flex items-center justify-between transition-colors group"
                      >
                        <span className="text-xs font-bold text-slate-700 group-hover:text-blue-900">{shName}</span>
                        <span className="text-[10px] text-blue-900 font-semibold bg-blue-50 px-2 py-0.5 rounded border border-blue-100">Pilih & Import</span>
                      </div>
                    ))
                  )}
                </div>

                <div className="flex justify-end pt-2 border-t border-slate-200">
                  <button
                    onClick={() => {
                      setShowArchiveModal(false);
                      setArchiveSearchQuery("");
                    }}
                    className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold px-4 py-2 rounded-lg text-xs transition-all"
                  >
                    Batal
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer Kerajaan Rasmi */}
          <footer className="bg-blue-955 text-slate-400 text-[10px] font-semibold tracking-wider text-center py-4 border-t-2 border-amber-500 mt-auto no-print">
            SISTEM KEPUTUSAN JAWATANKUASA PAS LAWATAN IKHTISAS (JKPLIK) &copy; {meetingYear} MALAYSIA. HAK CIPTA JAWATANKUASA TERPELIHARA.
          </footer>

        </div>
      );
    }

    // Melakukan render aplikasi React ke dalam DOM Element
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
