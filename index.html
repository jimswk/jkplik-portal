<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Keputusan JKPLIK</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel CDN (untuk parse JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- Tampal kod app.jsx anda di sini menggunakan skrip babel -->
    <script type="text/babel">
        import React, { useState, useEffect, useMemo } from 'react';
import { 
  Building2, Users, FileText, CheckCircle2, AlertTriangle, XCircle, Search, 
  PlusCircle, Printer, Presentation, Database, Settings, ChevronLeft, ChevronRight, 
  ArrowRight, Download, Upload, RefreshCw, Layers, Check, HelpCircle, Eye, Trash2, Edit3, Plus, UserCheck
} from 'lucide-react';

// Mengosongkan data bawaan supaya pengguna boleh memulakan ujian dengan pangkalan data yang bersih
const INITIAL_OG_DATA = [];

const SECTORS_LIST = [
  { id: "og", name: "1. Minyak & Gas (Oil & Gas)" },
  { id: "perkhidmatan", name: "2. Perkhidmatan" },
  { id: "kerajaan", name: "3. Kerajaan" },
  { id: "lanjutan", name: "4. Lanjutan" },
  { id: "kelulusan_dasar", name: "5. Kelulusan Dasar" }
];

export default function App() {
  const [meetingNumber, setMeetingNumber] = useState(() => {
    return localStorage.getItem('jkplik_meeting_number') || "14";
  });
  const [meetingYear, setMeetingYear] = useState(() => {
    return localStorage.getItem('jkplik_meeting_year') || "2026";
  });
  const [officerName, setOfficerName] = useState(() => {
    return localStorage.getItem('jkplik_officer_name') || "";
  });

  const [activeSector, setActiveSector] = useState("og");
  const [viewMode, setViewMode] = useState("dashboard"); // dashboard, meeting, settings
  const [dataOG, setDataOG] = useState(() => {
    const saved = localStorage.getItem('jkplik_data_og_v2');
    return saved ? JSON.parse(saved) : INITIAL_OG_DATA;
  });
  const [dataOthers, setDataOthers] = useState(() => {
    const saved = localStorage.getItem('jkplik_data_others_v2');
    return saved ? JSON.parse(saved) : {};
  });

  // State Pembentangan Slaid
  const [currentSlideIndex, setCurrentSlideIndex] = useState(0);

  // State Carian & Penapisan
  const [searchQuery, setSearchQuery] = useState("");
  const [statusFilter, setStatusFilter] = useState("semua");

  // Integrasi Google Sheet
  const [sheetUrl, setSheetUrl] = useState(() => {
    return localStorage.getItem('jkplik_sheet_url_v2') || "";
  });
  const [isSyncing, setIsSyncing] = useState(false);
  const [syncLogs, setSyncLogs] = useState([]);

  // Modal Pendaftaran & State Auto-suggest
  const [showAddModal, setShowAddModal] = useState(false);
  const [companySearchQuery, setCompanySearchQuery] = useState("");
  const [ownerSearchQuery, setOwnerSearchQuery] = useState("");
  const [showCompanyDropdown, setShowCompanyDropdown] = useState(false);
  const [showOwnerDropdown, setShowOwnerDropdown] = useState(false);

  const [newCompany, setNewCompany] = useState({
    namaSyarikat: "",
    alamat: "",
    kegiatan: "",
    projek: "",
    noKontrak: "",
    tempohProjek: "",
    ownerProjek: "",
    tempohMohon: "06 BULAN",
    permohonanBaru: 0,
    warganegaraRingkasan: "0",
    penyandang: []
  });

  const [newPenyandang, setNewPenyandang] = useState({
    nama: "", jantina: "L", warganegara: "MYS", pasport: "", tarikhLahir: "", umur: "", jawatan: "", gaji: ""
  });

  const uniqueCompanies = useMemo(() => {
    const all = [...dataOG];
    Object.values(dataOthers).forEach(arr => {
      if (Array.isArray(arr)) all.push(...arr);
    });
    const seen = new Set();
    const result = [];
    all.forEach(item => {
      if (!item.namaSyarikat) return;
      const cleanName = item.namaSyarikat.trim().toUpperCase();
      if (!seen.has(cleanName)) {
        seen.add(cleanName);
        result.push({
          namaSyarikat: item.namaSyarikat,
          alamat: item.alamat,
          kegiatan: item.kegiatan
        });
      }
    });
    return result;
  }, [dataOG, dataOthers]);

  const uniqueOwners = useMemo(() => {
    const all = [...dataOG];
    Object.values(dataOthers).forEach(arr => {
      if (Array.isArray(arr)) all.push(...arr);
    });
    const seen = new Set();
    const result = [];
    all.forEach(item => {
      const cleanOwner = item.ownerProjek?.trim().toUpperCase();
      if (cleanOwner && !seen.has(cleanOwner)) {
        seen.add(cleanOwner);
        result.push(item.ownerProjek);
      }
    });
    return result;
  }, [dataOG, dataOthers]);

  const currentSectData = useMemo(() => {
    if (activeSector === "og") {
      return dataOG;
    }
    return dataOthers[activeSector] || [];
  }, [activeSector, dataOG, dataOthers]);

  const filteredData = useMemo(() => {
    return currentSectData.filter(item => {
      const matchSearch = item.namaSyarikat.toLowerCase().includes(searchQuery.toLowerCase()) || 
                          (item.ownerProjek && item.ownerProjek.toLowerCase().includes(searchQuery.toLowerCase())) ||
                          item.penyandang.some(p => p.nama.toLowerCase().includes(searchQuery.toLowerCase()));
      
      const status = item.keputusan || "belum";
      const matchStatus = statusFilter === "semua" || 
                         (statusFilter === "belum" && status === "") || 
                         (statusFilter === "lulus" && status === "LULUS") ||
                         (statusFilter === "lulus_bersyarat" && status === "LULUS BERSYARAT") ||
                         (statusFilter === "tolak" && status === "TOLAK") ||
                         (statusFilter === "semakan" && status === "SEMAKAN / NAZIRAN");
      
      return matchSearch && matchStatus;
    });
  }, [currentSectData, searchQuery, statusFilter]);

  useEffect(() => {
    localStorage.setItem('jkplik_data_og_v2', JSON.stringify(dataOG));
  }, [dataOG]);

  useEffect(() => {
    localStorage.setItem('jkplik_data_others_v2', JSON.stringify(dataOthers));
  }, [dataOthers]);

  useEffect(() => {
    localStorage.setItem('jkplik_sheet_url_v2', sheetUrl);
  }, [sheetUrl]);

  useEffect(() => {
    localStorage.setItem('jkplik_meeting_number', meetingNumber);
    localStorage.setItem('jkplik_meeting_year', meetingYear);
    localStorage.setItem('jkplik_officer_name', officerName);
  }, [meetingNumber, meetingYear, officerName]);

  // Memastikan slaid kekal dalam had lajur senarai
  useEffect(() => {
    if (currentSlideIndex >= filteredData.length) {
      setCurrentSlideIndex(Math.max(0, filteredData.length - 1));
    }
  }, [filteredData, currentSlideIndex]);

  // Menguruskan input papan kekunci (Keyboard Navigation) untuk Mod Pembentangan Slaid
  useEffect(() => {
    const handleKeyDown = (e) => {
      if (viewMode !== 'meeting') return;
      if (e.key === 'ArrowLeft') {
        setCurrentSlideIndex(prev => Math.max(0, prev - 1));
      } else if (e.key === 'ArrowRight') {
        setCurrentSlideIndex(prev => Math.min(filteredData.length - 1, prev + 1));
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [viewMode, filteredData]);

  const handleSaveDecision = (id, keputusan, ulasan) => {
    if (activeSector === "og") {
      setDataOG(prev => prev.map(item => item.id === id ? { ...item, keputusan, ulasan } : item));
    } else {
      setDataOthers(prev => {
        const sectorData = prev[activeSector] || [];
        const updated = sectorData.map(item => item.id === id ? { ...item, keputusan, ulasan } : item);
        return { ...prev, [activeSector]: updated };
      });
    }

    if (sheetUrl) {
      syncSingleRowToGoogleSheets(id, keputusan, ulasan);
    }
  };

  const handleRegisterCompany = (e) => {
    e.preventDefault();
    if (!newCompany.namaSyarikat) return;

    const newItem = {
      ...newCompany,
      id: `${activeSector.toUpperCase()}-${Date.now()}`,
      bil: currentSectData.length + 1,
      keputusan: "",
      ulasan: ""
    };

    if (activeSector === "og") {
      setDataOG(prev => [...prev, newItem]);
    } else {
      setDataOthers(prev => {
        const sectorData = prev[activeSector] || [];
        return { ...prev, [activeSector]: [...sectorData, newItem] };
      });
    }

    // Tetapkan semula borang pendaftaran kepada keadaan bersih
    setNewCompany({
      namaSyarikat: "",
      alamat: "",
      kegiatan: "",
      projek: "",
      noKontrak: "",
      tempohProjek: "",
      ownerProjek: "",
      tempohMohon: "06 BULAN",
      permohonanBaru: 0,
      warganegaraRingkasan: "0",
      penyandang: []
    });
    setCompanySearchQuery("");
    setOwnerSearchQuery("");
    setShowAddModal(false);
  };

  const addPenyandangToNewCompany = () => {
    if (!newPenyandang.nama) return;
    setNewCompany(prev => {
      const updatedPenyandang = [...prev.penyandang, newPenyandang];
      return {
        ...prev,
        penyandang: updatedPenyandang,
        permohonanBaru: updatedPenyandang.length,
        warganegaraRingkasan: `${updatedPenyandang.length} MYS 'A'`
      };
    });
    setNewPenyandang({
      nama: "", jantina: "L", warganegara: "MYS", pasport: "", tarikhLahir: "", umur: "", jawatan: "", gaji: ""
    });
  };

  const removePenyandangFromNewCompany = (idx) => {
    setNewCompany(prev => {
      const filtered = prev.penyandang.filter((_, i) => i !== idx);
      return {
        ...prev,
        penyandang: filtered,
        permohonanBaru: filtered.length,
        warganegaraRingkasan: filtered.length > 0 ? `${filtered.length} MYS 'A'` : "0"
      };
    });
  };

  const handleDeleteItem = (id) => {
    if (confirm("Adakah anda pasti untuk memadam rekod ini secara kekal?")) {
      if (activeSector === "og") {
        setDataOG(prev => prev.filter(item => item.id !== id).map((item, i) => ({ ...item, bil: i + 1 })));
      } else {
        setDataOthers(prev => {
          const filtered = (prev[activeSector] || []).filter(item => item.id !== id);
          return { ...prev, [activeSector]: filtered.map((item, i) => ({ ...item, bil: i + 1 })) };
        });
      }
    }
  };

  // Membina Format Nama Fail / Tab Dinamik untuk Jabatan Kerajaan
  const getSheetName = () => {
    const cleanOfficer = officerName.trim() ? ` (${officerName.trim()})` : '';
    return `Bil. ${meetingNumber}/${meetingYear}${cleanOfficer}`;
  };

  const syncSingleRowToGoogleSheets = async (id, keputusan, ulasan) => {
    const sheetName = getSheetName();
    addLog(`Menghantar kemas kini untuk ID: ${id} ke tab [${sheetName}]...`, "info");
    try {
      await fetch(sheetUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          action: "update", 
          id, 
          keputusan, 
          ulasan, 
          activeSector,
          sheetName: sheetName
        })
      });
      addLog(`Keputusan ${id} berjaya dihantar ke Google Sheets [Tab: ${sheetName}].`, "success");
    } catch (err) {
      addLog(`Gagal menyegerakan keputusan ke Sheets: ${err.message}`, "error");
    }
  };

  const handleFullSync = async () => {
    if (!sheetUrl) {
      alert("Sila masukkan URL Google Web App yang sah terlebih dahulu.");
      return;
    }
    setIsSyncing(true);
    const sheetName = getSheetName();
    addLog(`Memulakan penyelarasan penuh dengan Google Sheets ke tab [${sheetName}]...`, "info");

    try {
      await fetch(sheetUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
          action: "sync_all", 
          data: currentSectData, 
          activeSector,
          sheetName: sheetName
        })
      });
      
      addLog(`Penyelarasan penuh berjaya dihantar ke Google Sheets [Tab: ${sheetName}]!`, "success");
      alert("Data berjaya disegerakkan!");
    } catch (err) {
      addLog(`Penyelarasan penuh gagal: ${err.message}`, "error");
      alert("Gagal menyegerakkan data.");
    } finally {
      setIsSyncing(false);
    }
  };

  const addLog = (message, type = "info") => {
    const timestamp = new Date().toLocaleTimeString();
    setSyncLogs(prev => [{ timestamp, message, type }, ...prev.slice(0, 19)]);
  };

  const handlePrint = () => {
    window.print();
  };

  // Mengira Ringkasan Statistik
  const stats = useMemo(() => {
    const total = currentSectData.length;
    let lulus = 0;
    let lulusBersyarat = 0;
    let tolak = 0;
    let semakan = 0;
    let belum = 0;
    let totalApplicants = 0;

    currentSectData.forEach(item => {
      totalApplicants += (item.penyandang || []).length;
      if (item.keputusan === "LULUS") lulus++;
      else if (item.keputusan === "LULUS BERSYARAT") lulusBersyarat++;
      else if (item.keputusan === "TOLAK") tolak++;
      else if (item.keputusan === "SEMAKAN / NAZIRAN") semakan++;
      else belum++;
    });

    return { total, lulus, lulusBersyarat, tolak, semakan, belum, totalApplicants };
  }, [currentSectData]);

  const filteredCompanySuggestions = useMemo(() => {
    if (!companySearchQuery) return [];
    return uniqueCompanies.filter(c => 
      c.namaSyarikat.toLowerCase().includes(companySearchQuery.toLowerCase())
    );
  }, [companySearchQuery, uniqueCompanies]);

  const filteredOwnerSuggestions = useMemo(() => {
    if (!ownerSearchQuery) return [];
    return uniqueOwners.filter(o => 
      o.toLowerCase().includes(ownerSearchQuery.toLowerCase())
    );
  }, [ownerSearchQuery, uniqueOwners]);

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 font-sans flex flex-col selection:bg-blue-600 selection:text-white print:bg-white">
      
      {}
      <header className="sticky top-0 z-40 bg-white border-b-4 border-amber-500 shadow-md px-6 py-4 flex flex-wrap items-center justify-between gap-4 print:hidden">
        <div className="flex items-center gap-4">
          <div className="bg-gradient-to-tr from-blue-900 to-blue-800 p-2.5 rounded-xl text-white shadow-md">
            {/* Lambang Pengurusan Kerajaan Rasmi */}
            <div className="w-12 h-12 flex flex-col items-center justify-center font-bold text-center text-[10px] leading-tight border border-amber-400 rounded p-1 bg-blue-950">
              <span className="text-amber-400">KDN</span>
              <span className="border-t border-slate-500 w-full my-0.5" />
              <span>JIM</span>
            </div>
          </div>
          <div>
            <h1 className="text-xl font-bold tracking-tight text-blue-950 flex items-center gap-2">
              PORTAL KEPUTUSAN JKPLIK MALAYSIA
            </h1>
            <p className="text-xs text-slate-600 font-semibold uppercase tracking-wider flex items-center gap-2">
              <span>Jawatankuasa Pas Lawatan Ikhtisas</span>
              <span className="h-3 w-px bg-slate-300" />
              <span className="text-amber-600 font-bold">Sesi Mesyuarat Dinamik</span>
            </p>
          </div>
        </div>

        {/* Bahagian Pelarasan Dinamik Bilangan Mesyuarat */}
        <div className="flex items-center gap-2 bg-slate-100 p-2 rounded-lg border border-slate-300">
          <div className="flex items-center gap-1">
            <span className="text-xs font-bold text-slate-700">Bil:</span>
            <input 
              type="number" 
              value={meetingNumber} 
              onChange={(e) => setMeetingNumber(e.target.value)}
              className="w-12 bg-white border border-slate-300 rounded px-1.5 py-0.5 text-xs font-bold text-blue-900 focus:outline-none focus:border-blue-700"
            />
          </div>
          <div className="flex items-center gap-1">
            <span className="text-xs font-bold text-slate-700">Tahun:</span>
            <input 
              type="number" 
              value={meetingYear} 
              onChange={(e) => setMeetingYear(e.target.value)}
              className="w-16 bg-white border border-slate-300 rounded px-1.5 py-0.5 text-xs font-bold text-blue-900 focus:outline-none focus:border-blue-700"
            />
          </div>
        </div>

        {/* Butang Kawalan Mod */}
        <div className="flex items-center gap-2">
          <button
            onClick={() => setViewMode("dashboard")}
            className={`px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 border transition-all ${
              viewMode === "dashboard"
                ? "bg-blue-900 text-white border-blue-900 shadow-sm"
                : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50"
            }`}
          >
            <Database size={14} /> Utama
          </button>
          
          <button
            onClick={() => setViewMode("meeting")}
            className={`px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-2 border transition-all ${
              viewMode === "meeting"
                ? "bg-amber-500 text-slate-900 border-amber-500 shadow-sm font-black"
                : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50"
            }`}
          >
            <Presentation size={14} /> Mod Slaid
          </button>

          <button
            onClick={() => setViewMode("settings")}
            className={`p-2 rounded-lg border transition-all ${
              viewMode === "settings"
                ? "bg-blue-900 text-white border-blue-900"
                : "bg-white text-slate-600 border-slate-300 hover:bg-slate-50"
            }`}
            title="Integrasi & Nama Pegawai"
          >
            <Settings size={15} />
          </button>

          <button
            onClick={handlePrint}
            className="p-2 bg-white text-slate-700 hover:text-blue-900 rounded-lg border border-slate-300 transition-all"
            title="Cetak Laporan / PDF"
          >
            <Printer size={15} />
          </button>
        </div>
      </header>

      {}
      <div className="bg-blue-950 text-white py-3 px-6 flex items-center gap-2 overflow-x-auto print:hidden shadow-inner">
        <span className="text-xs font-bold text-amber-400 uppercase tracking-widest whitespace-nowrap mr-3">SEKTOR KDN:</span>
        <div className="flex gap-2">
          {SECTORS_LIST.map((sect) => (
            <button
              key={sect.id}
              onClick={() => {
                setActiveSector(sect.id);
                setCurrentSlideIndex(0);
              }}
              className={`px-3 py-1 rounded text-xs font-bold transition-all whitespace-nowrap ${
                activeSector === sect.id
                  ? 'bg-amber-500 text-slate-950 shadow'
                  : 'bg-blue-900/50 hover:bg-blue-900 text-slate-200'
              }`}
            >
              {sect.name}
              <span className="ml-1.5 px-1.5 py-0.2 rounded-full bg-blue-950 text-[10px] text-amber-300 font-bold">
                {sect.id === "og" ? dataOG.length : (dataOthers[sect.id] || []).length}
              </span>
            </button>
          ))}
        </div>
      </div>

      {/* Kawasan Kandungan Utama */}
      <main className="flex-1 flex flex-col p-6 max-w-7xl mx-auto w-full gap-6 print:p-0">

        {/* Ringkasan Dashboard Kad */}
        {viewMode !== "meeting" && (
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 print:hidden">
            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-1">
              <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Syarikat Terlibat</span>
              <span className="text-xl font-black text-blue-900">{stats.total} Syarikat</span>
            </div>

            <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-1">
              <span className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Pemohon (Orang)</span>
              <span className="text-xl font-black text-teal-600">{stats.totalApplicants} Orang</span>
            </div>

            <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200 shadow-sm flex flex-col gap-1">
              <span className="text-[10px] text-emerald-700 font-bold uppercase tracking-wider">Disyor Lulus</span>
              <span className="text-xl font-black text-emerald-700">{stats.lulus} Rekod</span>
            </div>

            <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 shadow-sm flex flex-col gap-1">
              <span className="text-[10px] text-amber-800 font-bold uppercase tracking-wider">Lulus Bersyarat</span>
              <span className="text-xl font-black text-amber-800">{stats.lulusBersyarat} Rekod</span>
            </div>

            <div className="bg-red-50 p-4 rounded-xl border border-red-200 shadow-sm flex flex-col gap-1">
              <span className="text-[10px] text-red-700 font-bold uppercase tracking-wider">Disyor Tolak</span>
              <span className="text-xl font-black text-red-700">{stats.tolak} Rekod</span>
            </div>

            <div className="bg-slate-100 p-4 rounded-xl border border-slate-300 shadow-sm flex flex-col gap-1">
              <span className="text-[10px] text-slate-600 font-bold uppercase tracking-wider font-semibold text-slate-700">Belum Diputus</span>
              <span className="text-xl font-black text-amber-600">{stats.belum} Rekod</span>
            </div>
          </div>
        )}

        {/* VIEW 1: UTAMA / DASHBOARD */}
        {viewMode === "dashboard" && (
          <div className="flex flex-col gap-6 print:hidden">
            
            <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
              <div className="flex items-center gap-3 w-full md:w-auto flex-1 max-w-md">
                <div className="relative w-full">
                  <Search size={16} className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400" />
                  <input
                    type="text"
                    placeholder="Cari nama permohonan syarikat, projek atau penyandang..."
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="w-full bg-slate-50 border border-slate-300 rounded-lg pl-10 pr-4 py-2 text-xs text-slate-800 focus:outline-none focus:border-blue-700 transition-colors"
                  />
                </div>
              </div>

              <div className="flex flex-wrap items-center gap-3">
                <select
                  value={statusFilter}
                  onChange={(e) => setStatusFilter(e.target.value)}
                  className="bg-white border border-slate-300 text-slate-700 text-xs font-bold rounded-lg px-3 py-2 focus:outline-none focus:border-blue-700"
                >
                  <option value="semua">Semua Keputusan</option>
                  <option value="belum">Belum Diputuskan</option>
                  <option value="lulus">Lulus</option>
                  <option value="lulus_bersyarat">Lulus Bersyarat</option>
                  <option value="tolak">Tolak</option>
                  <option value="semakan">Semakan/Naziran</option>
                </select>

                <button
                  onClick={() => setShowAddModal(true)}
                  className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-4 py-2.5 rounded-lg flex items-center gap-2 shadow-sm transition-colors"
                >

          </div>
          <div>
            <strong>Lulus Bersyarat:</strong> {stats.lulusBersyarat} Rekod
          </div>
        </div>

        <table className="w-full border-collapse mt-6 text-[10px] text-left">
          <thead>
            <tr className="border-b-2 border-slate-900 bg-slate-50">
              <th className="py-2 font-bold w-12 text-center">BIL</th>
              <th className="py-2 font-bold px-2">NAMA SYARIKAT</th>
              <th className="py-2 font-bold px-2">BUTIRAN PENYANDANG / JAWATAN</th>
              <th className="py-2 font-bold px-2">NAMA PROJEK & PEMILIK</th>
              <th className="py-2 font-bold text-center">KEPUTUSAN</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-300">
            {currentSectData.map((item, idx) => (
              <tr key={item.id} className="py-2">
                <td className="py-3 text-center font-bold align-top">{idx + 1}.</td>
                <td className="py-3 align-top px-2">
                  <div className="font-bold text-blue-900">{item.namaSyarikat}</div>
                  <div className="text-[9px] text-slate-500 mt-0.5">{item.alamat}</div>
                </td>
                <td className="py-3 align-top px-2">
                  <div className="flex flex-col gap-1.5">
                    {(item.penyandang || []).map((p, pidx) => (
                      <div key={pidx} className="border-l-2 border-slate-400 pl-2 text-[9px]">
                        <strong>{pidx + 1}. {p.nama}</strong> ({p.warganegara}) <br/>
                        {p.jawatan} • Gaji: {p.gaji || "N/A"}
                      </div>
                    ))}
                  </div>
                </td>
                <td className="py-3 align-top px-2">
                  <div className="font-semibold text-slate-700">{item.projek}</div>
                  <div className="text-[9px] text-amber-800 font-bold mt-1 uppercase">Owner: {item.ownerProjek}</div>
                </td>
                <td className="py-3 align-top text-center">
                  <div className="font-bold border border-slate-850 px-2 py-1 rounded inline-block text-[9px] min-w-[80px]">
                    {item.keputusan || "BELUM DIPUTUS"}
                  </div>
                  {item.ulasan && (
                    <div className="text-[9px] text-slate-500 italic mt-1 max-w-[150px] text-left">
                      Ulasan: "{item.ulasan}"
                    </div>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {}
      {showAddModal && (
        <div className="fixed inset-0 bg-[#020617]/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className="bg-white border border-slate-200 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto flex flex-col p-6 shadow-2xl relative">
            
            <div className="flex items-center justify-between border-b border-slate-200 pb-4 mb-4">
              <h3 className="text-base font-bold text-blue-950 flex items-center gap-1.5">
                <PlusCircle size={18} className="text-emerald-600" /> Daftar Permohonan Baru
              </h3>
              <button 
                onClick={() => setShowAddModal(false)}
                className="text-slate-400 hover:text-slate-600 text-xs font-bold"
              >
                Tutup
              </button>
            </div>

            <form onSubmit={handleRegisterCompany} className="flex flex-col gap-4 text-xs text-slate-700">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                {/* 1. Auto-suggest Nama Syarikat / Carian Syarikat Wujud */}
                <div className="flex flex-col gap-1.5 relative">
                  <label className="text-xs font-bold text-slate-700 flex items-center justify-between">
                    <span>Nama Syarikat & No. Pendaftaran</span>
                    <span className="text-[9px] text-blue-700 italic">Sistem menyemak database sedia ada</span>
                  </label>
                  <input
                    type="text"
                    required
                    placeholder="Contoh: BARISAN SAMUDERA SDN BHD (514578-X)"
                    value={newCompany.namaSyarikat}
                    onChange={(e) => {
                      const val = e.target.value;
                      setNewCompany({...newCompany, namaSyarikat: val});
                      setCompanySearchQuery(val);
                      setShowCompanyDropdown(true);
                    }}
                    onFocus={() => setShowCompanyDropdown(true)}
                    className="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-blue-700"
                  />
                  {showCompanyDropdown && filteredCompanySuggestions.length > 0 && (
                    <div className="absolute top-[58px] left-0 right-0 bg-white border border-slate-300 rounded-lg shadow-lg z-50 max-h-40 overflow-y-auto">
                      {filteredCompanySuggestions.map((suggestion, idx) => (
                        <div
                          key={idx}
                          onClick={() => {
                            setNewCompany({
                              ...newCompany,
                              namaSyarikat: suggestion.namaSyarikat,
                              alamat: suggestion.alamat,
                              kegiatan: suggestion.kegiatan
                            });
                            setShowCompanyDropdown(false);
                            setCompanySearchQuery("");
                          }}
                          className="p-2.5 hover:bg-slate-100 cursor-pointer border-b border-slate-150 last:border-b-0 text-left"
                        >
                          <div className="font-bold text-blue-950">{suggestion.namaSyarikat}</div>
                          <div className="text-[10px] text-slate-500 truncate">{suggestion.alamat}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {/* 2. Auto-suggest Pemilik Projek Sedia Ada */}
                <div className="flex flex-col gap-1.5 relative">
                  <label className="text-xs font-bold text-slate-700 flex items-center justify-between">
                    <span>Pemilik Projek (Owner Project)</span>
                    <span className="text-[9px] text-amber-700 italic">Sila semak atau taip pemilik baru</span>
                  </label>
                  <input
                    type="text"
                    required
                    placeholder="Contoh: PETRONAS CARIGALI SDN BHD"
                    value={newCompany.ownerProjek}
                    onChange={(e) => {
                      const val = e.target.value;
                      setNewCompany({...newCompany, ownerProjek: val});
                      setOwnerSearchQuery(val);
                      setShowOwnerDropdown(true);
                    }}
                    onFocus={() => setShowOwnerDropdown(true)}
                    className="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-blue-700"
                  />
                  {showOwnerDropdown && filteredOwnerSuggestions.length > 0 && (
                    <div className="absolute top-[58px] left-0 right-0 bg-white border border-slate-300 rounded-lg shadow-lg z-50 max-h-40 overflow-y-auto">
                      {filteredOwnerSuggestions.map((suggestion, idx) => (
                        <div
                          key={idx}
                          onClick={() => {
                            setNewCompany({
                              ...newCompany,
                              ownerProjek: suggestion
                            });
                            setShowOwnerDropdown(false);
                            setOwnerSearchQuery("");
                          }}
                          className="p-2.5 hover:bg-slate-100 cursor-pointer border-b border-slate-150 last:border-b-0 text-left text-slate-800 font-bold"
                        >
                          {suggestion}
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                <div className="flex flex-col gap-1.5 md:col-span-2">
                  <label className="text-xs font-bold text-slate-700">Alamat Penuh Syarikat</label>
                  <input
                    type="text"
                    required
                    placeholder="Sila isi alamat pejabat / pendaftaran penuh..."
                    value={newCompany.alamat}
                    onChange={(e) => setNewCompany({...newCompany, alamat: e.target.value})}
                    className="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-blue-700"
                  />
                </div>

                <div className="flex flex-col gap-1.5 md:col-span-2">
                  <label className="text-xs font-bold text-slate-700">Aktiviti / Kegiatan Utama Syarikat</label>
                  <textarea
                    rows={2}
                    placeholder="Nyatakan kegiatan mengikut lesen Suruhanjaya Syarikat Malaysia (SSM)..."
                    value={newCompany.kegiatan}
                    onChange={(e) => setNewCompany({...newCompany, kegiatan: e.target.value})}
                    className="bg-slate-50 border border-slate-300 rounded-lg p-3 text-xs text-slate-800 focus:outline-none focus:border-blue-700 resize-none font-sans"
                  />
                </div>

                <div className="flex flex-col gap-1.5 md:col-span-2">
                  <label className="text-xs font-bold text-slate-700">Nama Projek Pembentangan (Project Name)</label>
                  <input
                    type="text"
                    required
                    placeholder="Sila nyatakan butiran projek mengikut Letter of Award (LOA)..."
                    value={newCompany.projek}
                    onChange={(e) => setNewCompany({...newCompany, projek: e.target.value})}
                    className="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none focus:border-blue-700"
                  />
                </div>

                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-slate-700">No. Kontrak</label>
                  <input
                    type="text"
                    placeholder="Contoh: RFP-000000032393"
                    value={newCompany.noKontrak}
                    onChange={(e) => setNewCompany({...newCompany, noKontrak: e.target.value})}
                    className="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none"
                  />
                </div>

                <div className="flex flex-col gap-1.5">
                  <label className="text-xs font-bold text-slate-700">Tempoh Projek / Kontrak</label>
                  <input
                    type="text"
                    placeholder="Contoh: 11 JAN 2026 – 10 JAN 2027 atau UNTIL COMPLETION"
                    value={newCompany.tempohProjek}
                    onChange={(e) => setNewCompany({...newCompany, tempohProjek: e.target.value})}
                    className="bg-slate-50 border border-slate-300 rounded-lg px-3 py-2 text-xs text-slate-800 focus:outline-none"
                  />
                </div>

              </div>

              {/* Tambahan Ahli / Penyandang */}
              <div className="border-t border-slate-200 pt-4 mt-2 flex flex-col gap-3">
                <span className="text-xs font-bold text-blue-950 uppercase tracking-wider flex items-center gap-1.5">
                  Maklumat Ahli / Penyandang (Pemohon Pas Lawatan Ikhtisas)
                </span>

                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 bg-slate-50 p-4 rounded-xl border border-slate-200">
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] text-slate-500 font-bold">Nama Penuh</span>
                    <input
                      type="text"
                      placeholder="Nama penuh pemohon"
                      value={newPenyandang.nama}
                      onChange={(e) => setNewPenyandang({...newPenyandang, nama: e.target.value})}
                      className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs text-slate-850 focus:outline-none focus:border-blue-700"
                    />
                  </div>
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] text-slate-500 font-bold">Jawatan</span>
                    <input
                      type="text"
                      placeholder="Contoh: Specialist Surveyor"
                      value={newPenyandang.jawatan}
                      onChange={(e) => setNewPenyandang({...newPenyandang, jawatan: e.target.value})}
                      className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs text-slate-850 focus:outline-none focus:border-blue-700"
                    />
                  </div>
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] text-slate-500 font-bold">Gaji Bulanan</span>
                    <input
                      type="text"
                      placeholder="Contoh: RM7,000"
                      value={newPenyandang.gaji}
                      onChange={(e) => setNewPenyandang({...newPenyandang, gaji: e.target.value})}
                      className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs text-slate-850 focus:outline-none focus:border-blue-700"
                    />
                  </div>
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] text-slate-500 font-bold">No. Pasport / ID</span>
                    <input
                      type="text"
                      placeholder="Contoh: A58331694"
                      value={newPenyandang.pasport}
                      onChange={(e) => setNewPenyandang({...newPenyandang, pasport: e.target.value})}
                      className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs text-slate-850 focus:outline-none"
                    />
                  </div>
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] text-slate-500 font-bold">Warganegara</span>
                    <input
                      type="text"
                      placeholder="Contoh: MYS"
                      value={newPenyandang.warganegara}
                      onChange={(e) => setNewPenyandang({...newPenyandang, warganegara: e.target.value})}
                      className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs text-slate-850 focus:outline-none"
                    />
                  </div>
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] text-slate-500 font-bold">Umur (Tahun)</span>
                    <input
                      type="text"
                      placeholder="Contoh: 38 THN"
                      value={newPenyandang.umur}
                      onChange={(e) => setNewPenyandang({...newPenyandang, umur: e.target.value})}
                      className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs text-slate-850 focus:outline-none"
                    />
                  </div>
                  <div className="flex flex-col gap-1">
                    <span className="text-[10px] text-slate-500 font-bold">Jantina</span>
                    <select
                      value={newPenyandang.jantina}
                      onChange={(e) => setNewPenyandang({...newPenyandang, jantina: e.target.value})}
                      className="bg-white border border-slate-300 rounded px-2.5 py-1.5 text-xs text-slate-850 focus:outline-none"
                    >
                      <option value="L">Lelaki</option>
                      <option value="P">Perempuan</option>
                    </select>
                  </div>
                  <div className="flex items-end">
                    <button
                      type="button"
                      onClick={addPenyandangToNewCompany}
                      className="w-full bg-blue-900 hover:bg-blue-850 text-white font-bold py-1.5 rounded text-xs border border-blue-900 shadow-sm transition-colors"
                    >
                      + Tambah Pemohon
                    </button>
                  </div>
                </div>

                {/* Senarai Penyandang Semasa Didaftarkan */}
                {newCompany.penyandang.length > 0 && (
                  <div className="flex flex-col gap-2 bg-slate-50 p-3 rounded-lg border border-slate-200 max-h-32 overflow-y-auto">
                    {newCompany.penyandang.map((p, idx) => (
                      <div key={idx} className="flex items-center justify-between text-xs border-b border-slate-200 pb-1.5 last:border-0 last:pb-0">
                        <span>{idx + 1}. <strong>{p.nama}</strong> ({p.jawatan} • {p.gaji})</span>
                        <button
                          type="button"
                          onClick={() => removePenyandangFromNewCompany(idx)}
                          className="text-red-600 hover:text-red-800 font-bold text-[10px]"
                        >
                          Padam
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div className="flex items-center justify-end gap-3 border-t border-slate-200 pt-4 mt-4">
                <button
                  type="button"
                  onClick={() => setShowAddModal(false)}
                  className="bg-transparent text-slate-500 hover:text-slate-700 text-xs font-bold px-4 py-2"
                >
                  Batal
                </button>
                <button
                  type="submit"
                  disabled={newCompany.penyandang.length === 0}
                  className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-5 py-2.5 rounded-lg disabled:opacity-50 transition-colors"
                >
                  Selesai Daftar Permohonan
                </button>
              </div>

            </form>

          </div>
        </div>
      )}

      {/* Kaki Web (Footer) Rasmi Kerajaan */}
      <footer className="bg-blue-950 text-slate-400 text-[10px] font-semibold tracking-wider text-center py-4 border-t-2 border-amber-500 mt-auto print:hidden">
        HAK CIPTA TERPELIHARA &copy; {meetingYear} JAWATANKUASA PAS LAWATAN IKHTISAS (JKPLIK) MALAYSIA.
      </footer>

    </div>
  );
}
        
        // Di bahagian paling bawah kod React yang ditampal, pastikan anda tambah baris ini untuk render ke HTML:
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
