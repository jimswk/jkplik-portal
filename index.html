<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Keputusan Mesyuarat JKPLIK Malaysia</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone CDN (Untuk menyusun sintaks JSX terus di browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Mengoptimumkan paparan cetakan PDF rasmi kerajaan */
    @media print {
      body {
        background-color: white !important;
        color: black !important;
      }
      .no-print {
        display: none !important;
      }
      .print-page {
        display: block !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    }
    /* Menghilangkan scrollbar lalai untuk kemasan estetik */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

  <!-- Kontainer Utama Aplikasi React -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Senarai 5 Sektor Utama yang dikehendaki
    const SECTORS_LIST = [
      { id: "og", name: "1. Minyak & Gas (Oil & Gas)" },
      { id: "perkhidmatan", name: "2. Perkhidmatan" },
      { id: "kerajaan", name: "3. Kerajaan" },
      { id: "lanjutan", name: "4. Lanjutan" },
      { id: "kelulusan_dasar", name: "5. Kelulusan Dasar" }
    ];

    // Komponen Ikon SVG Tempatan bagi menghindarkan ralat import modul luaran
    function Icon({ name, size = 16, className = "" }) {
      const paths = {
        building: <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" />,
        users: (
          <g>
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </g>
        ),
        fileText: (
          <g>
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </g>
        ),
        checkCircle: (
          <g>
            <circle cx="12" cy="12" r="10" />
            <path d="m9 12 2 2 4-4" />
          </g>
        ),
        alertTriangle: (
          <g>
            <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </g>
        ),
        xCircle: (
          <g>
            <circle cx="12" cy="12" r="10" />
            <line x1="15" y1="9" x2="9" y2="15" />
            <line x1="9" y1="9" x2="15" y2="15" />
          </g>
        ),
        search: (
          <g>
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </g>
        ),
        plusCircle: (
          <g>
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="16" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </g>
        ),
        printer: (
          <g>
            <polyline points="6 9 6 2 18 2 18 9" />
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" />
            <rect x="6" y="14" width="12" height="8" />
          </g>
        ),
        presentation: (
          <g>
            <path d="M2 3h20" />
            <path d="M21 3v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V3" />
            <path d="m7 21 5-5 5 5" />
          </g>
        ),
        database: (
          <g>
            <rect x="3" y="4" width="18" height="16" rx="2" ry="2" />
            <line x1="3" y1="10" x2="21" y2="10" />
            <line x1="3" y1="16" x2="21" y2="16" />
          </g>
        ),
        settings: (
          <g>
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </g>
        ),
        chevronLeft: <polyline points="15 18 9 12 15 6" />,
        chevronRight: <polyline points="9 18 15 12 9 6" />,
        check: <polyline points="20 6 9 17 4 12" />,
        trash: (
          <g>
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
            <line x1="10" y1="11" x2="10" y2="17" />
            <line x1="14" y1="11" x2="14" y2="17" />
          </g>
        ),
        edit: (
          <g>
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
          </g>
        ),
        userCheck: (
          <g>
            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="8" cy="7" r="4" />
            <polyline points="17 11 19 13 23 9" />
          </g>
        ),
        helpCircle: (
          <g>
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </g>
        ),
        upload: (
          <g>
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </g>
        ),
        refresh: (
          <g>
            <polyline points="23 4 23 10 17 10" />
            <polyline points="1 20 1 14 7 14" />
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
          </g>
        )
      };

      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width={size}
          height={size}
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth="2"
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {paths[name] || null}
        </svg>
      );
    }

    function App() {
      // Maklumat mesyuarat yang disimpan ke LocalStorage
      const [meetingNumber, setMeetingNumber] = useState(() => {
        return localStorage.getItem('jkplik_meeting_number') || "14";
      });
      const [meetingYear, setMeetingYear] = useState(() => {
        return localStorage.getItem('jkplik_meeting_year') || "2026";
      });
      const [officerName, setOfficerName] = useState(() => {
        return localStorage.getItem('jkplik_officer_name') || "";
      });

      const [activeSector, setActiveSector] = useState("og");
      const [viewMode, setViewMode] = useState("dashboard"); // dashboard, meeting, settings

      // Pangkalan data tempatan (Bermula kosong sepenuhnya seperti permintaan anda)
      const [dataOG, setDataOG] = useState(() => {
        const saved = localStorage.getItem('jkplik_data_og_clean');
        return saved ? JSON.parse(saved) : [];
      });
      const [dataOthers, setDataOthers] = useState(() => {
        const saved = localStorage.getItem('jkplik_data_others_clean');
        return saved ? JSON.parse(saved) : {};
      });

      // Pengurusan Slaid
      const [currentSlideIndex, setCurrentSlideIndex] = useState(0);

      // Carian & Penapisan
      const [searchQuery, setSearchQuery] = useState("");
      const [statusFilter, setStatusFilter] = useState("semua");

      // Konfigurasi Google Sheets Integration
      const [sheetUrl, setSheetUrl] = useState(() => {
        return localStorage.getItem('jkplik_sheet_url_clean') || "";
      });
      const [isSyncing, setIsSyncing] = useState(false);
      const [syncLogs, setSyncLogs] = useState([]);

      // Modal Pendaftaran Baru & Auto-suggest State
      const [showAddModal, setShowAddModal] = useState(false);
      const [companySearchQuery, setCompanySearchQuery] = useState("");
      const [ownerSearchQuery, setOwnerSearchQuery] = useState("");
      const [showCompanyDropdown, setShowCompanyDropdown] = useState(false);
      const [showOwnerDropdown, setShowOwnerDropdown] = useState(false);

      // Bina semula borang pendaftaran syarikat kepada keadaan sifar
      const [newCompany, setNewCompany] = useState({
        namaSyarikat: "",
        alamat: "",
        kegiatan: "",
        projek: "",
        noKontrak: "",
        tempohProjek: "",
        ownerProjek: "",
        tempohMohon: "06 BULAN",
        permohonanBaru: 0,
        warganegaraRingkasan: "0",
        penyandang: []
      });

      // Bina semula pemohon baharu
      const [newPenyandang, setNewPenyandang] = useState({
        nama: "", jantina: "L", warganegara: "MYS", pasport: "", tarikhLahir: "", umur: "", jawatan: "", gaji: ""
      });

      // Mengira pangkalan data unik untuk semakan automatik ketika pendaftaran baharu
      const uniqueCompanies = useMemo(() => {
        const all = [...dataOG];
        Object.values(dataOthers).forEach(arr => {
          if (Array.isArray(arr)) all.push(...arr);
        });
        const seen = new Set();
        const result = [];
        all.forEach(item => {
          if (!item.namaSyarikat) return;
          const cleanName = item.namaSyarikat.trim().toUpperCase();
          if (!seen.has(cleanName)) {
            seen.add(cleanName);
            result.push({
              namaSyarikat: item.namaSyarikat,
              alamat: item.alamat,
              kegiatan: item.kegiatan
            });
          }
        });
        return result;
      }, [dataOG, dataOthers]);

      const uniqueOwners = useMemo(() => {
        const all = [...dataOG];
        Object.values(dataOthers).forEach(arr => {
          if (Array.isArray(arr)) all.push(...arr);
        });
        const seen = new Set();
        const result = [];
        all.forEach(item => {
          const cleanOwner = item.ownerProjek?.trim().toUpperCase();
          if (cleanOwner && !seen.has(cleanOwner)) {
            seen.add(cleanOwner);
            result.push(item.ownerProjek);
          }
        });
        return result;
      }, [dataOG, dataOthers]);

      const currentSectData = useMemo(() => {
        if (activeSector === "og") {
          return dataOG;
        }
        return dataOthers[activeSector] || [];
      }, [activeSector, dataOG, dataOthers]);

      // Menapis data berdasarkan carian atau keputusan mesyuarat
      const filteredData = useMemo(() => {
        return currentSectData.filter(item => {
          const matchSearch = item.namaSyarikat.toLowerCase().includes(searchQuery.toLowerCase()) || 
                              (item.ownerProjek && item.ownerProjek.toLowerCase().includes(searchQuery.toLowerCase())) ||
                              item.penyandang.some(p => p.nama.toLowerCase().includes(searchQuery.toLowerCase()));
          
          const status = item.keputusan || "belum";
          const matchStatus = statusFilter === "semua" || 
                             (statusFilter === "belum" && status === "") || 
                             (statusFilter === "lulus" && status === "LULUS") ||
                             (statusFilter === "lulus_bersyarat" && status === "LULUS BERSYARAT") ||
                             (statusFilter === "tolak" && status === "TOLAK") ||
                             (statusFilter === "semakan" && status === "SEMAKAN / NAZIRAN");
          
          return matchSearch && matchStatus;
        });
      }, [currentSectData, searchQuery, statusFilter]);

      // Mengemas kini rekod ke dalam storan LocalStorage setiap kali ada perubahan
      useEffect(() => {
        localStorage.setItem('jkplik_data_og_clean', JSON.stringify(dataOG));
      }, [dataOG]);

      useEffect(() => {
        localStorage.setItem('jkplik_data_others_clean', JSON.stringify(dataOthers));
      }, [dataOthers]);

      useEffect(() => {
        localStorage.setItem('jkplik_sheet_url_clean', sheetUrl);
      }, [sheetUrl]);

      useEffect(() => {
        localStorage.setItem('jkplik_meeting_number', meetingNumber);
        localStorage.setItem('jkplik_meeting_year', meetingYear);
        localStorage.setItem('jkplik_officer_name', officerName);
      }, [meetingNumber, meetingYear, officerName]);

      // Memastikan navigasi slaid sentiasa berada di dalam had senarai
      useEffect(() => {
        if (currentSlideIndex >= filteredData.length) {
          setCurrentSlideIndex(Math.max(0, filteredData.length - 1));
        }
      }, [filteredData, currentSlideIndex]);

      // Mengendalikan input papan kekunci (Keyboard Navigation) untuk Slaid
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (viewMode !== 'meeting') return;
          if (e.key === 'ArrowLeft') {
            setCurrentSlideIndex(prev => Math.max(0, prev - 1));
          } else if (e.key === 'ArrowRight') {
            setCurrentSlideIndex(prev => Math.min(filteredData.length - 1, prev + 1));
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [viewMode, filteredData]);

      // Menyimpan keputusan dan catatan mesyuarat
      const handleSaveDecision = (id, keputusan, ulasan) => {
        if (activeSector === "og") {
          setDataOG(prev => prev.map(item => item.id === id ? { ...item, keputusan, ulasan } : item));
        } else {
          setDataOthers(prev => {
            const sectorData = prev[activeSector] || [];
            const updated = sectorData.map(item => item.id === id ? { ...item, keputusan, ulasan } : item);
            return { ...prev, [activeSector]: updated };
          });
        }

        if (sheetUrl) {
          syncSingleRowToGoogleSheets(id, keputusan, ulasan);
        }
      };

      // Mendaftar permohonan syarikat baru
      const handleRegisterCompany = (e) => {
        e.preventDefault();
        if (!newCompany.namaSyarikat) return;

        const newItem = {
          ...newCompany,
          id: `${activeSector.toUpperCase()}-${Date.now()}`,
          bil: currentSectData.length + 1,
          keputusan: "",
          ulasan: ""
        };

        if (activeSector === "og") {
          setDataOG(prev => [...prev, newItem]);
        } else {
          setDataOthers(prev => {
            const sectorData = prev[activeSector] || [];
            return { ...prev, [activeSector]: [...sectorData, newItem] };
          });
        }

        // Tetapkan semula borang pendaftaran kepada sifar
        setNewCompany({
          namaSyarikat: "",
          alamat: "",
          kegiatan: "",
          projek: "",
          noKontrak: "",
          tempohProjek: "",
          ownerProjek: "",
          tempohMohon: "06 BULAN",
          permohonanBaru: 0,
          warganegaraRingkasan: "0",
          penyandang: []
        });
        setCompanySearchQuery("");
        setOwnerSearchQuery("");
        setShowAddModal(false);
      };

      // Tambah Penyandang (Kakitangan) ke syarikat yang sedang didaftar
      const addPenyandangToNewCompany = () => {
        if (!newPenyandang.nama) return;
        setNewCompany(prev => {
          const updatedPenyandang = [...prev.penyandang, newPenyandang];
          return {
            ...prev,
            penyandang: updatedPenyandang,
            permohonanBaru: updatedPenyandang.length,
            warganegaraRingkasan: `${updatedPenyandang.length} MYS 'A'`
          };
        });
        setNewPenyandang({
          nama: "", jantina: "L", warganegara: "MYS", pasport: "", tarikhLahir: "", umur: "", jawatan: "", gaji: ""
        });
      };

      const removePenyandangFromNewCompany = (idx) => {
        setNewCompany(prev => {
          const filtered = prev.penyandang.filter((_, i) => i !== idx);
          return {
            ...prev,
            penyandang: filtered,
            permohonanBaru: filtered.length,
            warganegaraRingkasan: filtered.length > 0 ? `${filtered.length} MYS 'A'` : "0"
          };
        });
      };

      const handleDeleteItem = (id) => {
        if (confirm("Adakah anda pasti untuk memadam rekod permohonan ini?")) {
          if (activeSector === "og") {
            setDataOG(prev => prev.filter(item => item.id !== id).map((item, i) => ({ ...item, bil: i + 1 })));
          } else {
            setDataOthers(prev => {
              const filtered = (prev[activeSector] || []).filter(item => item.id !== id);
              return { ...prev, [activeSector]: filtered.map((item, i) => ({ ...item, bil: i + 1 })) };
            });
          }
        }
      };

      // Format tajuk dokumen Google Sheets dinamik
      const getSheetName = () => {
        const cleanOfficer = officerName.trim() ? ` (${officerName.trim()})` : '';
        return `Bil. ${meetingNumber}/${meetingYear}${cleanOfficer}`;
      };

      // Menghantar keputusan baris secara tunggal ke Google Sheets
      const syncSingleRowToGoogleSheets = async (id, keputusan, ulasan) => {
        const sheetName = getSheetName();
        addLog(`Menghantar kemas kini untuk ID: ${id} ke tab [${sheetName}]...`, "info");
        try {
          await fetch(sheetUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              action: "update", 
              id, 
              keputusan, 
              ulasan, 
              activeSector,
              sheetName: sheetName
            })
          });
          addLog(`Keputusan ${id} berjaya dihantar ke Google Sheets [Tab: ${sheetName}].`, "success");
        } catch (err) {
          addLog(`Gagal menyegerakan keputusan ke Sheets: ${err.message}`, "error");
        }
      };

      // Menghantar kesemua rekod dalam sektor aktif ke Google Sheets
      const handleFullSync = async () => {
        if (!sheetUrl) {
          alert("Sila masukkan URL Google Web App yang sah terlebih dahulu di tetingkap Tetapan.");
          return;
        }
        setIsSyncing(true);
        const sheetName = getSheetName();
        addLog(`Memulakan penyelarasan penuh dengan Google Sheets ke tab [${sheetName}]...`, "info");

        try {
          await fetch(sheetUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              action: "sync_all", 
              data: currentSectData, 
              activeSector,
              sheetName: sheetName
            })
          });
          
          addLog(`Penyelarasan penuh berjaya dihantar ke Google Sheets [Tab: ${sheetName}]!`, "success");
          alert("Data berjaya disegerakkan sepenuhnya ke Google Sheets!");
        } catch (err) {
          addLog(`Penyelarasan penuh gagal: ${err.message}`, "error");
          alert("Gagal menyegerakkan data.");
        } finally {
          setIsSyncing(false);
        }
      };

      const addLog = (message, type = "info") => {
        const timestamp = new Date().toLocaleTimeString();
        setSyncLogs(prev => [{ timestamp, message, type }, ...prev.slice(0, 19)]);
      };

      const handlePrint = () => {
        window.print();
      };

      // Mengira data statistik mesyuarat secara dinamik
      const stats = useMemo(() => {
        const total = currentSectData.length;
        let lulus = 0;
        let lulusBersyarat = 0;
        let tolak = 0;
        let semakan = 0;
        let belum = 0;
        let totalApplicants = 0;

        currentSectData.forEach(item => {
          totalApplicants += (item.penyandang || []).length;
          if (item.keputusan === "LULUS") lulus++;
          else if (item.keputusan === "LULUS BERSYARAT") lulusBersyarat++;
          else if (item.keputusan === "TOLAK") tolak++;
          else if (item.keputusan === "SEMAKAN / NAZIRAN") semakan++;
          else belum++;
        });

        return { total, lulus, lulusBersyarat, tolak, semakan, belum, totalApplicants };
      }, [currentSectData]);

      // Menapis cadangan auto-semak semasa pendaftaran syarikat
      const filteredCompanySuggestions = useMemo(() => {
        if (!companySearchQuery) return [];
        return uniqueCompanies.filter(c => 
          c.namaSyarikat.toLowerCase().includes(companySearchQuery.toLowerCase())
        );
      }, [companySearchQuery, uniqueCompanies]);

      const filteredOwnerSuggestions = useMemo(() => {
        if (!ownerSearchQuery) return [];
        return uniqueOwners.filter(o => 
          o.toLowerCase().includes(ownerSearchQuery.toLowerCase())
        );
      }, [ownerSearchQuery, uniqueOwners]);

      return (
        <div className="flex-1 flex flex-col min-h-screen">
          
          {/* ================================= HEADER & NAVIGASI ================================= */}
          <header className="sticky top-0 z-40 bg-white border-b-4 border-amber-500 shadow-md px-6 py-4 flex flex-wrap items-center justify-between gap-4 no-print">
            <div className="flex items-center gap-4">
              <div className="bg-gradient-to-tr from-blue-900 to-blue-800 p-2.5 rounded-xl text-white shadow-md">
                <div className="w-12 h-12 flex flex-col items-center justify-center font-bold text-center text-[10px] leading-tight border border-amber-400 rounded p-1 bg-blue-950">
                  <span className="text-amber-400">KDN</span>
                  <span className="border-t border-slate-500 w-full my-0.5" />
                  <span>JIM</span>
                </div>
              </div>

                          type="button"
                          onClick={addPenyandangToNewCompany}
                          className="w-full bg-blue-900 hover:bg-blue-850 text-white font-bold py-1.5 rounded text-xs border border-blue-900 shadow-sm transition-colors"
                        >
                          + Tambah Pemohon
                        </button>
                      </div>
                    </div>

                    {/* Kakitangan Yang Dipilih Semasa */}
                    {newCompany.penyandang.length > 0 && (
                      <div className="flex flex-col gap-2 bg-slate-50 p-3 rounded-lg border border-slate-200 max-h-32 overflow-y-auto">
                        {newCompany.penyandang.map((p, idx) => (
                          <div key={idx} className="flex items-center justify-between text-xs border-b border-slate-200 pb-1.5 last:border-0 last:pb-0">
                            <span>{idx + 1}. <strong>{p.nama}</strong> ({p.jawatan} • {p.gaji})</span>
                            <button
                              type="button"
                              onClick={() => removePenyandangFromNewCompany(idx)}
                              className="text-red-600 hover:text-red-800 font-bold text-[10px]"
                            >
                              Padam Rekod Kakitangan
                            </button>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>

                  <div className="flex items-center justify-end gap-3 border-t border-slate-200 pt-4 mt-4">
                    <button
                      type="button"
                      onClick={() => setShowAddModal(false)}
                      className="bg-transparent text-slate-500 hover:text-slate-700 text-xs font-bold px-4 py-2"
                    >
                      Batal Pendaftaran
                    </button>
                    <button
                      type="submit"
                      disabled={newCompany.penyandang.length === 0}
                      className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-5 py-2.5 rounded-lg disabled:opacity-50 transition-colors"
                    >
                      Selesaikan Pendaftaran Permohonan
                    </button>
                  </div>

                </form>

              </div>
            </div>
          )}

          {/* Footer Kerajaan Rasmi */}
          <footer className="bg-blue-950 text-slate-400 text-[10px] font-semibold tracking-wider text-center py-4 border-t-2 border-amber-500 mt-auto no-print">
            SISTEM KEPUTUSAN JAWATANKUASA PAS LAWATAN IKHTISAS (JKPLIK) &copy; {meetingYear} MALAYSIA. HAK CIPTA JAWATANKUASA TERPELIHARA.
          </footer>

        </div>
      );
    }

    // Melakukan Render ke HTML Element
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
